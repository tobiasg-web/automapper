<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="automapper">
    <title>automapper</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        #root { display: flex; flex-direction: column; height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect, useRef } = React;

        const DailyPhotoJournal = () => {
            const [tab, setTab] = useState('today');
            const [photos, setPhotos] = useState([]);
            const [todayPhoto, setTodayPhoto] = useState(null);
            const [showCamera, setShowCamera] = useState(false);
            const [selectedPhoto, setSelectedPhoto] = useState(null);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [timezone, setTimezone] = useState(null);
            const [nextPromptTime, setNextPromptTime] = useState(null);

            // Initialize timezone on mount
            useEffect(() => {
                const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                setTimezone(tz);
                calculateNextPrompt();
                
                // Load photos from localStorage
                const stored = localStorage.getItem('automapperPhotos');
                if (stored) {
                    setPhotos(JSON.parse(stored));
                }
                checkTodayPhoto();
            }, []);

            const calculateNextPrompt = () => {
                const now = new Date();
                const hours = now.getHours();
                
                let nextHour;
                if (hours >= 22 || hours < 7) {
                    nextHour = 7;
                    now.setDate(now.getDate() + 1);
                } else {
                    nextHour = Math.floor(Math.random() * (22 - hours)) + hours + 1;
                }
                
                const nextTime = new Date(now);
                nextTime.setHours(nextHour, Math.floor(Math.random() * 60), 0);
                setNextPromptTime(nextTime);
            };

            const checkTodayPhoto = () => {
                const today = new Date().toDateString();
                const stored = localStorage.getItem('automapperPhotos');
                if (stored) {
                    const allPhotos = JSON.parse(stored);
                    const todayPhoto = allPhotos.find(p => new Date(p.timestamp).toDateString() === today);
                    setTodayPhoto(todayPhoto);
                }
            };

            const startCamera = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment' } 
                    });
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                        setShowCamera(true);
                    }
                } catch (err) {
                    alert('Camera access denied. Go to Settings > Safari > Camera and allow access.');
                }
            };

            const stopCamera = () => {
                if (videoRef.current && videoRef.current.srcObject) {
                    videoRef.current.srcObject.getTracks().forEach(track => track.stop());
                }
                setShowCamera(false);
            };

            const capturePhoto = async () => {
                if (!canvasRef.current || !videoRef.current) return;

                const ctx = canvasRef.current.getContext('2d');
                canvasRef.current.width = videoRef.current.videoWidth;
                canvasRef.current.height = videoRef.current.videoHeight;
                ctx.drawImage(videoRef.current, 0, 0);

                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject);
                    });

                    const photoData = {
                        id: Date.now(),
                        timestamp: new Date().toISOString(),
                        imageData: canvasRef.current.toDataURL('image/jpeg', 0.85),
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                        accuracy: position.coords.accuracy,
                        privacyLevel: 3,
                    };

                    const updated = [...photos, photoData];
                    setPhotos(updated);
                    localStorage.setItem('automapperPhotos', JSON.stringify(updated));
                    setTodayPhoto(photoData);
                    stopCamera();
                    calculateNextPrompt();
                    alert('Photo captured!');
                } catch (err) {
                    alert('Location access denied. Enable in Settings > Safari > Location.');
                }
            };

            const updatePrivacy = (photoId, level) => {
                const updated = photos.map(p => 
                    p.id === photoId ? { ...p, privacyLevel: level } : p
                );
                setPhotos(updated);
                localStorage.setItem('automapperPhotos', JSON.stringify(updated));
                if (selectedPhoto && selectedPhoto.id === photoId) {
                    setSelectedPhoto({ ...selectedPhoto, privacyLevel: level });
                }
            };

            const deletePhoto = (photoId) => {
                const updated = photos.filter(p => p.id !== photoId);
                setPhotos(updated);
                localStorage.setItem('automapperPhotos', JSON.stringify(updated));
                setSelectedPhoto(null);
            };

            const blurLocation = (lat, lng, privacyLevel) => {
                const blurAmount = (6 - privacyLevel) * 0.1;
                return {
                    lat: parseFloat((lat + (Math.random() - 0.5) * blurAmount).toFixed(4)),
                    lng: parseFloat((lng + (Math.random() - 0.5) * blurAmount).toFixed(4))
                };
            };

            const getPrivacyLabel = (level) => {
                const labels = {
                    1: 'Exact location',
                    2: 'Street level',
                    3: 'Neighborhood',
                    4: 'City',
                    5: 'Region/Country'
                };
                return labels[level];
            };

            const exportAlbum = () => {
                const exportData = {
                    title: 'My Travel Journal',
                    timezone: timezone,
                    created: new Date().toISOString(),
                    photos: photos.map(p => ({
                        timestamp: p.timestamp,
                        imageData: p.imageData,
                        blurredLat: blurLocation(p.lat, p.lng, p.privacyLevel).lat,
                        blurredLng: blurLocation(p.lat, p.lng, p.privacyLevel).lng,
                        privacyLevel: p.privacyLevel,
                        privacyLabel: getPrivacyLabel(p.privacyLevel)
                    }))
                };

                const dataStr = JSON.stringify(exportData);
                const dataUri = 'data:text/plain;charset=utf-8,' + encodeURIComponent(dataStr);
                const exportFileDefaultName = `automapper-${new Date().toISOString().split('T')[0]}.json`;

                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileDefaultName);
                linkElement.click();
            };

            return (
                <div className="flex flex-col h-screen bg-white">
                    {/* Header */}
                    <div className="bg-slate-900 text-white p-4 border-b border-slate-700">
                        <h1 className="text-lg font-semibold">automapper</h1>
                        <p className="text-xs text-slate-400 mt-1">Daily photo journal • {timezone}</p>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 overflow-y-auto">
                        {tab === 'today' && (
                            <div className="p-4 space-y-4">
                                {/* Prompt Status */}
                                <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                                    <h2 className="font-semibold text-blue-900 mb-2">Today's Prompt</h2>
                                    {todayPhoto ? (
                                        <div className="text-sm text-blue-800">
                                            <p className="font-medium">Photo captured!</p>
                                            <p className="text-xs mt-1">{new Date(todayPhoto.timestamp).toLocaleString()}</p>
                                        </div>
                                    ) : (
                                        <div className="text-sm text-blue-800">
                                            <p className="font-medium">No photo yet today</p>
                                            {nextPromptTime && (
                                                <p className="text-xs mt-1">Next prompt: {nextPromptTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</p>
                                            )}
                                        </div>
                                    )}
                                </div>

                                {/* Camera Button */}
                                <button
                                    onClick={startCamera}
                                    className="w-full bg-slate-900 text-white py-3 rounded-lg flex items-center justify-center gap-2 font-medium hover:bg-slate-800 active:bg-slate-700"
                                >
                                    📷 Capture Photo
                                </button>

                                {/* Today's Photo Preview */}
                                {todayPhoto && (
                                    <div className="space-y-2">
                                        <img 
                                            src={todayPhoto.imageData} 
                                            alt="Today" 
                                            className="w-full rounded-lg cursor-pointer"
                                            onClick={() => setSelectedPhoto(todayPhoto)}
                                        />
                                        <div className="text-xs text-slate-500">
                                            Privacy: {getPrivacyLabel(todayPhoto.privacyLevel)}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {tab === 'album' && (
                            <div className="p-4">
                                <div className="grid grid-cols-2 gap-3">
                                    {photos.map(photo => (
                                        <div
                                            key={photo.id}
                                            className="relative rounded-lg overflow-hidden cursor-pointer"
                                            onClick={() => setSelectedPhoto(photo)}
                                        >
                                            <img 
                                                src={photo.imageData} 
                                                alt={new Date(photo.timestamp).toLocaleDateString()}
                                                className="w-full aspect-square object-cover"
                                            />
                                            <div className="absolute top-2 right-2 bg-black/50 text-white px-2 py-1 rounded text-xs font-medium">
                                                {photo.privacyLevel}/5
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                {photos.length === 0 && (
                                    <p className="text-center text-slate-400 py-8">No photos yet. Start capturing!</p>
                                )}
                            </div>
                        )}

                        {tab === 'map' && (
                            <div className="p-4">
                                <div className="space-y-3">
                                    {photos.length === 0 ? (
                                        <p className="text-center text-slate-400 py-8">No photos to map yet</p>
                                    ) : (
                                        photos.map(photo => {
                                            const blurred = blurLocation(photo.lat, photo.lng, photo.privacyLevel);
                                            return (
                                                <div
                                                    key={photo.id}
                                                    className="border border-slate-200 rounded-lg p-3 cursor-pointer hover:bg-slate-50"
                                                    onClick={() => setSelectedPhoto(photo)}
                                                >
                                                    <img 
                                                        src={photo.imageData} 
                                                        alt="thumbnail"
                                                        className="w-full h-32 object-cover rounded mb-2"
                                                    />
                                                    <div className="flex items-start gap-2">
                                                        <span>📍</span>
                                                        <div className="text-sm">
                                                            <p className="text-slate-900 font-mono text-xs">{blurred.lat.toFixed(2)}°, {blurred.lng.toFixed(2)}°</p>
                                                            <p className="text-xs text-slate-500">{getPrivacyLabel(photo.privacyLevel)}</p>
                                                            <p className="text-xs text-slate-400 mt-1">{new Date(photo.timestamp).toLocaleDateString()}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Photo Detail Modal */}
                    {selectedPhoto && (
                        <div className="fixed inset-0 bg-black/75 flex items-end z-50" onClick={() => setSelectedPhoto(null)}>
                            <div className="bg-white w-full rounded-t-2xl p-4 space-y-4 max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-semibold text-sm">{new Date(selectedPhoto.timestamp).toLocaleString()}</h3>
                                    <button onClick={() => setSelectedPhoto(null)} className="text-slate-400 hover:text-slate-600 text-lg">✕</button>
                                </div>

                                <img src={selectedPhoto.imageData} alt="Full view" className="w-full rounded-lg" />

                                {/* Privacy Slider */}
                                <div className="space-y-2">
                                    <label className="text-sm font-medium text-slate-700">Location Privacy</label>
                                    <input
                                        type="range"
                                        min="1"
                                        max="5"
                                        value={selectedPhoto.privacyLevel}
                                        onChange={(e) => updatePrivacy(selectedPhoto.id, parseInt(e.target.value))}
                                        className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                                    />
                                    <div className="flex justify-between text-xs text-slate-500">
                                        <span>Exact</span>
                                        <span>{getPrivacyLabel(selectedPhoto.privacyLevel)}</span>
                                        <span>Country</span>
                                    </div>
                                </div>

                                {/* Location Info */}
                                <div className="bg-slate-50 rounded-lg p-3 space-y-1 text-sm">
                                    <p className="text-slate-500 text-xs">Captured coordinates</p>
                                    <p className="font-mono text-slate-900 text-xs">{selectedPhoto.lat.toFixed(6)}, {selectedPhoto.lng.toFixed(6)}</p>
                                    <p className="text-xs text-slate-400 mt-2">±{Math.round(selectedPhoto.accuracy)}m accuracy</p>
                                </div>

                                {/* Action Buttons */}
                                <div className="flex gap-2 pt-4">
                                    <button
                                        onClick={() => deletePhoto(selectedPhoto.id)}
                                        className="flex-1 bg-red-50 text-red-600 py-2 rounded-lg font-medium active:bg-red-100"
                                    >
                                        Delete
                                    </button>
                                    <button
                                        onClick={() => setSelectedPhoto(null)}
                                        className="flex-1 bg-slate-900 text-white py-2 rounded-lg font-medium active:bg-slate-800"
                                    >
                                        Done
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Camera Modal */}
                    {showCamera && (
                        <div className="fixed inset-0 bg-black z-40 flex flex-col">
                            <video
                                ref={videoRef}
                                autoPlay
                                playsInline
                                className="flex-1 object-cover"
                            />
                            <canvas ref={canvasRef} className="hidden" />
                            
                            <div className="bg-black/80 p-4 flex gap-2">
                                <button
                                    onClick={stopCamera}
                                    className="flex-1 bg-slate-700 text-white py-3 rounded-lg font-medium active:bg-slate-600"
                                >
                                    Cancel
                                </button>
                                <button
                                    onClick={capturePhoto}
                                    className="flex-1 bg-white text-black py-3 rounded-lg font-medium active:bg-slate-100"
                                >
                                    Capture
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Bottom Navigation */}
                    <div className="border-t border-slate-200 bg-white grid grid-cols-4 gap-1 p-2">
                        <button
                            onClick={() => setTab('today')}
                            className={`py-3 flex flex-col items-center gap-1 rounded ${
                                tab === 'today' ? 'text-slate-900 bg-slate-100' : 'text-slate-400'
                            }`}
                        >
                            <span className="text-lg">📷</span>
                            <span className="text-xs font-medium">Today</span>
                        </button>
                        <button
                            onClick={() => setTab('album')}
                            className={`py-3 flex flex-col items-center gap-1 rounded ${
                                tab === 'album' ? 'text-slate-900 bg-slate-100' : 'text-slate-400'
                            }`}
                        >
                            <span className="text-lg">🖼️</span>
                            <span className="text-xs font-medium">Album</span>
                        </button>
                        <button
                            onClick={() => setTab('map')}
                            className={`py-3 flex flex-col items-center gap-1 rounded ${
                                tab === 'map' ? 'text-slate-900 bg-slate-100' : 'text-slate-400'
                            }`}
                        >
                            <span className="text-lg">🗺️</span>
                            <span className="text-xs font-medium">Map</span>
                        </button>
                        <button
                            onClick={exportAlbum}
                            className="py-3 flex flex-col items-center gap-1 rounded text-slate-400"
                        >
                            <span className="text-lg">📤</span>
                            <span className="text-xs font-medium">Export</span>
                        </button>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<DailyPhotoJournal />, document.getElementById('root'));
    </script>
</body>
</html>
